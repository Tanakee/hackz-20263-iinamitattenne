<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>いい波立ってんね～</title>
    <link rel="icon" href="data:,">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #app {
            width: 100%;
            height: 100vh;
        }
        /* ローディング画面 */
        #initial-loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a1628;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.6s ease;
        }
        #initial-loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .loading-title {
            color: #c8deff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .loading-sub {
            color: rgba(200, 222, 255, 0.5);
            font-size: 13px;
            margin-bottom: 40px;
        }
        /* 波紋アニメーション */
        .ripple-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
        }
        .ripple {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(68, 136, 255, 0.6);
            border-radius: 50%;
            animation: ripple-expand 2s ease-out infinite;
        }
        .ripple:nth-child(2) { animation-delay: 0.5s; }
        .ripple:nth-child(3) { animation-delay: 1.0s; }
        .ripple:nth-child(4) { animation-delay: 1.5s; }
        @keyframes ripple-expand {
            0% {
                width: 10px; height: 10px;
                opacity: 1;
            }
            100% {
                width: 120px; height: 120px;
                opacity: 0;
            }
        }
        /* 石のアイコン（中心の丸） */
        .stone-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 16px; height: 12px;
            background: rgba(68, 136, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(68, 136, 255, 0.4);
        }
        .loading-text {
            color: rgba(200, 222, 255, 0.6);
            font-size: 14px;
            animation: pulse-text 1.5s ease-in-out infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="initial-loading">
        <div class="loading-title">いい波立ってんね～</div>
        <div class="loading-sub">議論が波紋となり、風となって拡散される</div>
        <div class="ripple-container">
            <div class="stone-icon"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
        </div>
        <div class="loading-text">読み込み中...</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
