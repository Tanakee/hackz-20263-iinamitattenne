services:
  # データベース (MySQL)
  db:
    container_name: hackz-db
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=hackz_db
      - MYSQL_USER=hackz_user
      - MYSQL_PASSWORD=hackz_password
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - hackz-network

  # フロントエンド (Vue.js + Vite)
  frontend:
    container_name: hackz-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_GRAVITY_URL=/api/gravity
      - VITE_API_LOGIC_URL=/api/logic
    command: npm run dev
    networks:
      - hackz-network

  # バックエンド (Node.js/Express - 重力計算)
  gravity-api:
    container_name: hackz-gravity-api
    build:
      context: ./gravity-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NLP_API_URL=http://nlp-api:8001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
    networks:
      - hackz-network

  # バックエンド (PHP - 風化・熱量・DB)
  logic-api:
    container_name: hackz-logic-api
    build:
      context: ./logic-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./logic-api:/app
    environment:
      - DB_HOST=db
      - DB_USER=hackz_user
      - DB_PASSWORD=hackz_password
      - DB_NAME=hackz_db
      - GRAVITY_API_URL=http://gravity-api:8080
    depends_on:
      - db
    networks:
      - hackz-network

  # NLP API (Python)
  nlp-api:
    container_name: hackz-nlp-api
    build:
      context: ./nlp-api
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - hackz-network

volumes:
  db_data:

networks:
  hackz-network:
    driver: bridge
